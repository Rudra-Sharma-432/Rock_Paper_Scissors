<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #container {
        /* width: 100%; */
        height: 100%;
        background-color: rgb(19, 19, 19);
        /* padding: 10px; */
        align-content: center;
        text-align: center;
      }

      #opponent {
        position: relative;
        width: 90%;
        height: 45%;
        background-color: rgb(151, 36, 36);
        margin: 0 auto 0;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }

      #player {
        width: 90%;
        height: 45%;
        background-color: rgb(44, 37, 161);
        margin: 0 auto 0;
        position: relative;
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
      }

      #pHealth {
        position: absolute;
        top: 2%;
        right: 2%;
        color: white;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        font-size: 30px;
        user-select: none;
      }

      #oHealth {
        position: absolute;
        top: 2%;
        right: 2%;
        color: white;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        font-size: 30px;
        user-select: none;
      }

      #selector {
        text-align: center;
        align-content: center;
        width: 74px;
        height: 200px;
        padding: 3px;
        position: absolute;
        bottom: 3%;
        left: 2%;
        /* display: inline-flex; */
        background-color: rgba(0, 0, 0, 0.5);
        border-radius: 10px;
      }

      img {
        margin: 5% auto 5%;
        width: 50px;
        height: 50px;
        border: 5px;
        border-radius: 10px;
        object-fit: cover;
      }

      #Rock,
      #Paper,
      #Scissor {
        cursor: pointer;
      }

      button {
        position: absolute;
        bottom: 6%;
        left: 107px;
        width: auto;
        height: 35px;
        padding: 0 6px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 20px;
        font-weight: 700;
        background-color: rgb(255, 255, 255);
        color: rgb(0, 0, 0);
        border-radius: 13px;
        cursor: pointer;
      }

      #playerChoice {
        width: 125px;
        height: 125px;
        position: absolute;
        bottom: 22%;
        left: 50%;
      }

      #oppChoice {
        width: 125px;
        height: 125px;
        position: absolute;
        top: 20%;
        right: 50%;
      }

      #result {
        position: absolute;
        top: 50%;
        visibility: visible;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 50%;
        height: 70px;
        background-color: rgba(0, 0, 0, 0.65);
        border-radius: 17px;
        align-content: center;
      }

      #p-result {
        color: white;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        font-size: 25px;
      }
    </style>
  </head>

  <body>
    <div id="container">
      <div id="opponent">
        <img id="oppChoice" src="" alt="">
        <p id="oHealth">❤️❤️❤️</p>
      </div>
      <div id="player">
        <img id="playerChoice" src="" alt="">
        <div id="selector">
          <img onclick="pChose(1)" id="Rock" alt="Rock"
            src="https://i.pinimg.com/564x/af/f9/83/aff98370aa2d91f0d23c79ec03fb8330.jpg">
          <img onclick="pChose(2)" id="Paper" alt="Paper"
            src="https://i.pinimg.com/564x/f9/34/bf/f934bfe2e884a4b16b76c796b39c3db7.jpg">
          <img onclick="pChose(3)" id="Scissor" alt="Scissor"
            src="https://media.istockphoto.com/id/1077141900/vector/scissors-symbol.jpg?s=1024x1024&w=is&k=20&c=hrzGhLfNjwZ89oT2kP7JoKR-w8E1FpB23AbY1kfYM7A=">
        </div>
        <button onclick="nextRound()" id="myButton">CONFIRM</button>
        <p id="pHealth">❤️❤️❤️</p>
      </div>

      <div id="result" onclick="restart()">
        <p id="p-result" onclick="restart()"></p>
      </div>
    </div>

    <script>
      function wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      // 1,2,3 => rock, paper, scissor
      let playerChoice = 0;
      let oppChoice;

      let pHealth = 3;
      let oHealth = 3;
      let health3 = "❤️❤️❤️";
      let health2 = "❤️❤️";
      let health1 = "❤️";
      let health0 = "";
      let button = document.getElementById("myButton");

      document.getElementById("playerChoice").style.visibility = "hidden";
      document.getElementById("oppChoice").style.visibility = "hidden";

      async function restart() {


        if ((oHealth == 0) || (pHealth == 0)) {
          document.getElementById("p-result").innerHTML = "Please Wait...";
          await wait(1000); // wait 1 sec
          pHealth = 3;
          oHealth = 3;
          playerChoice = 0;
          document.getElementById("pHealth").innerHTML = health3;
          document.getElementById("oHealth").innerHTML = health3;
          document.getElementById("result").style.visibility = "hidden";
          document.getElementById("p-result").innerHTML = "";
          document.getElementById("p-result").style.cursor = "default";
          document.getElementById("result").style.cursor = "default";

          document.getElementById("Rock").style.width = "50px";
          document.getElementById("Paper").style.width = "50px";
          document.getElementById("Scissor").style.width = "50px";
          document.getElementById("Rock").style.height = "50px";
          document.getElementById("Paper").style.height = "50px";
          document.getElementById("Scissor").style.height = "50px";

          document.getElementById("playerChoice").style.visibility = "hidden";
          document.getElementById("oppChoice").style.visibility = "hidden";
          document.getElementById("oppChoice").src = "";
          document.getElementById("playerChoice").src = "";
        }
      }



      document.getElementById("result").style.visibility = "hidden";

      function pChose(choise) {
        playerChoice = choise;

        if (playerChoice == 1) {
          document.getElementById("Rock").style.height = "65px";
          document.getElementById("Paper").style.height = "50px";
          document.getElementById("Scissor").style.height = "50px";

          document.getElementById("Rock").style.width = "65px";
          document.getElementById("Paper").style.width = "50px";
          document.getElementById("Scissor").style.width = "50px";
        } else if (playerChoice == 2) {
          document.getElementById("Rock").style.height = "50px";
          document.getElementById("Paper").style.height = "65px";
          document.getElementById("Scissor").style.height = "50px";

          document.getElementById("Rock").style.width = "50px";
          document.getElementById("Paper").style.width = "65px";
          document.getElementById("Scissor").style.width = "50px";
        } else {
          document.getElementById("Rock").style.height = "50px";
          document.getElementById("Paper").style.height = "50px";
          document.getElementById("Scissor").style.height = "65px";

          document.getElementById("Rock").style.width = "50px";
          document.getElementById("Paper").style.width = "50px";
          document.getElementById("Scissor").style.width = "65px";
        }
      }

      async function nextRound() {
        if (playerChoice == "0") {
          alert("Please First Choose\nFrom Rock, Paper Or Scissor");
        } else {

          if ((oHealth == 0) || (pHealth == 0)) {
            document.getElementById("result").style.opacity = 0;
            await wait(100); // wait 0.1 sec
            document.getElementById("result").style.opacity = 1;
            document.getElementById("p-result").style.fontSize = "18xp";
            document.getElementById("p-result").innerHTML = "Press Reload To Restart The Match";
          } else if (document.getElementById("result").style.opacity < 0.2) {

            document.getAnimations("oppChoice").alt = "";
            document.getElementById("oppChoice").src = "";
            document.getAnimations("playerChoice").alt = "";
            document.getElementById("playerChoice").src = "";

            document.getElementById("p-result").innerHTML = "";
            document.getElementById("result").style.visibility = "hidden";
            button.disabled = true;
            button.style.background = "gray";



            oppChoice = Math.floor((Math.random() * 3) + 1);


            if (playerChoice == 1) {
              document.getElementById("playerChoice").alt = "Rock";
              document.getElementById("playerChoice").src = "https://i.pinimg.com/564x/35/4d/f7/354df7f39839a74073cb68497271c025.jpg";
            } else if (playerChoice == 2) {
              document.getElementById("playerChoice").alt = "Paper";
              document.getElementById("playerChoice").src = "https://i.pinimg.com/564x/5f/6a/13/5f6a1300b501d979b55c92f6d1fa5e60.jpg";
            } else {
              document.getElementById("playerChoice").alt = "Scissor";
              document.getElementById("playerChoice").src = "https://i.pinimg.com/564x/4a/2d/c7/4a2dc7b087e88da82314bb6635a91e7a.jpg";
            }


            // await wait(1000); // wait 1 sec

            if (oppChoice == 1) {
              document.getElementById("oppChoice").alt = "Rock";
              document.getElementById("oppChoice").src = "https://i.pinimg.com/564x/35/4d/f7/354df7f39839a74073cb68497271c025.jpg";
            } else if (oppChoice == 2) {
              document.getElementById("oppChoice").alt = "Paper";
              document.getElementById("oppChoice").src = "https://i.pinimg.com/564x/5f/6a/13/5f6a1300b501d979b55c92f6d1fa5e60.jpg";
            } else if (oppChoice == 3) {
              document.getElementById("oppChoice").alt = "Scissor";
              document.getElementById("oppChoice").src = "https://i.pinimg.com/564x/4a/2d/c7/4a2dc7b087e88da82314bb6635a91e7a.jpg";
            }

            document.getElementById("playerChoice").style.visibility = "visible";
            document.getElementById("oppChoice").style.visibility = "visible";

            await wait(500); // wait 0.5 sec

            // if statements for win, loose and draw
            let oC = oppChoice;
            let pC = playerChoice;
            if (((oC == 1) && (pC == 2)) || ((oC == 2) && (pC == 3)) || ((oC == 3) && (pC == 1))) {
              document.getElementById("p-result").innerHTML = "You Won";
              oHealth--;
              if (oHealth == 3) {
                document.getElementById("oHealth").innerHTML = health3;
              } else if (oHealth == 2) {
                document.getElementById("oHealth").innerHTML = health2;
              } else if (oHealth == 1) {
                document.getElementById("oHealth").innerHTML = health1;
              } else if (oHealth == 0) {
                document.getElementById("oHealth").innerHTML = health0;
                document.getElementById("p-result").innerHTML = "You Won The Match";

              }

            } else if (((oC == 1) && (pC == 3)) || ((oC == 2) && (pC == 1)) || ((oC == 3) && (pC == 2))) {
              document.getElementById("p-result").innerHTML = "You Loose";
              pHealth--;
              if (pHealth == 3) {
                document.getElementById("pHealth").innerHTML = health3;
              } else if (pHealth == 2) {
                document.getElementById("pHealth").innerHTML = health2;
              } else if (pHealth == 1) {
                document.getElementById("pHealth").innerHTML = health1;
              } else if (pHealth == 0) {
                document.getElementById("pHealth").innerHTML = health0;
                document.getElementById("p-result").innerHTML = "You Loose The Match";

              }

            } else {
              document.getElementById("p-result").innerHTML = "Round Draw";
            }

            document.getElementById("result").style.visibility = "visible";

            await wait(800); // wait 0.8 sec

            function fadeAway(element, duration) {
              let opacity = 1;
              const interval = setInterval(() => {
                opacity -= 0.01; // Adjust this value for fade speed
                element.style.opacity = opacity;

                if (opacity <= 0) {
                  element.style.opacity = 0;
                  clearInterval(interval);
                }
              }, duration / 100); // 100 steps for smooth fading
            }

            const divToFade = document.getElementById("result");
            fadeAway(divToFade, 3500); // Fade in 3.5 seconds

            if ((oHealth == 0) || (pHealth == 0)) {
              await wait(3000); // wait 3 sec
              document.getElementById("result").style.opacity = 1;
              document.getElementById("p-result").style.fontSize = "19xp";
              document.getElementById("p-result").innerHTML = "Press Here To Restart The Match";
              document.getElementById("p-result").style.cursor = "pointer";
              document.getElementById("result").style.cursor = "pointer";
            }

            await wait(2800);
            // document.getElementById("playerChoice").style.visibility = "hidden";
            // document.getElementById("oppChoice").style.visibility = "hidden";
            // document.getElementById("oppChoice").src = "";
            // document.getElementById("playerChoice").src = "";

          }

          button.disabled = false;
          button.style.background = "white";
        }
      }
    </script>
  </body>

</html>
